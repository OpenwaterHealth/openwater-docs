# =============================================================================
# Openwater Documentation — MkDocs configuration v5
# Changes from v4:
#   - Removed extra.homepage so clicking the logo navigates to the docs
#     root (docs.openwater.health) instead of leaving the site for
#     openwater.health. Standard docs-site convention.
# =============================================================================

site_name: Openwater Documentation
site_description: Open-source medical device platforms — Open-LIFU and Open-Motion
site_url: https://docs.openwater.health
site_author: Openwater Health

repo_url: https://github.com/OpenwaterHealth/openwater-docs
repo_name: OpenwaterHealth/openwater-docs
edit_uri: edit/main/docs/

copyright: >
  Copyright &copy; 2026 Openwater Health. Open Source. Always.<br>
  Documentation licensed under
  <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>.
  Hardware designs under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>.

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
theme:
  name: material
  language: en
  logo: assets/openwater-logo.png
  favicon: assets/favicon.ico
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: openwater
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js

# -----------------------------------------------------------------------------
# Markdown extensions
# -----------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - search:
      lang: en

# -----------------------------------------------------------------------------
# Navigation
# -----------------------------------------------------------------------------
nav:
  - Open-LIFU:
      - Overview: openlifu/index.md
      - Best Practices: openlifu/best-practices.md
      - Contributing: openlifu/contributing.md
      - The Open-LIFU System: openlifu/system.md
      - Software Development: openlifu/software.md
      - Hardware Development: openlifu/hardware.md
      - Slicer Open-LIFU: openlifu/slicer.md
      - Creating & Editing Sonication Protocols: openlifu/sonication-protocols.md
      - Water Tank Testing: openlifu/water-tank-testing.md
      - Latest 3D Slicer LIFU Software: https://github.com/OpenwaterHealth/SlicerOpenLIFU/releases/latest
      - Latest Test Application: https://github.com/OpenwaterHealth/openlifu-test-app/releases/latest
      - Latest Desktop Application: https://github.com/OpenwaterHealth/openlifu-desktop-application/releases/latest
      - Latest Python Toolbox: https://github.com/OpenwaterHealth/openlifu-python/releases/latest

  - Open-Motion:
      - Overview: openmotion/index.md
      - Best Practices: openmotion/best-practices.md
      - Contributing: openmotion/contributing.md
      - The Open-Motion System: openmotion/system.md
      - Software Development: openmotion/software.md
      - Hardware Development: openmotion/hardware.md
      - External Connectivity: openmotion/connectivity.md
      - Latest Software Release: https://github.com/OpenwaterHealth/openmotion-bloodflow-app/releases/latest
  - Community: https://openwaterhealth.github.io/openwater-community/

# -----------------------------------------------------------------------------
# Extra
# -----------------------------------------------------------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OpenwaterHealth
      name: OpenwaterHealth on GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/fS7vfAX4fA
      name: Join the Discord community
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/OpenwaterHealth
      name: Follow on X
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCvoo5XMm3a7wfeiVkBosznw
      name: Subscribe on YouTube
  generator: false

# -----------------------------------------------------------------------------
# Build behavior
# -----------------------------------------------------------------------------
strict: false
docs_dir: docs
site_dir: site
use_directory_urls: true
